services:
  - type: web
    name: lantern
    runtime: node
    plan: starter
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: off
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: FEISHU_WEBHOOK_PATH
        value: /feishu/events
      - key: SHOPIFY_SHOP_DOMAIN
        value: velotric-dealers-shop.myshopify.com
      - key: SHOPIFY_API_VERSION
        value: 2026-01
      - key: FEISHU_LANTERN_CHAT_ID
        sync: false
      - key: FEISHU_APP_ID
        sync: false
      - key: FEISHU_APP_SECRET
        sync: false
      - key: FEISHU_VERIFICATION_TOKEN
        sync: false
      - key: SHOPIFY_CLIENT_ID
        sync: false
      - key: SHOPIFY_CLIENT_SECRET
        sync: false
      - key: SHOPIFY_ADMIN_ACCESS_TOKEN
        sync: false
      - key: FEDEX_CLIENT_ID
        sync: false
      - key: FEDEX_CLIENT_SECRET
        sync: false
      - key: SURPATH_MCP_URL
        sync: false
